name: CI

on:
  push:
  pull_request:

jobs:
  test:
    name: Test (${{ matrix.os }}, Python ${{ matrix.python-version }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - macos-latest
        python-version:
          - "3.10"
          - "3.11"
          - "3.12"
          - "3.13"
          - "3.14"

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}

      - name: Set up uv
        uses: astral-sh/setup-uv@v7

      - name: Create virtual environment
        run: uv venv .venv -p ${{ matrix.python-version }}

      - name: Install Python tools
        run: uv pip install maturin pytest

      - name: Run Rust tests
        run: cargo test -q

      - name: Build editable Python package
        run: uv run maturin develop

      - name: Run Python smoke tests
        run: uv run pytest -q tests/python

  test-dev-python:
    name: Test (ubuntu-latest, Python 3.15-dev)
    runs-on: ubuntu-latest
    continue-on-error: true

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.15-dev"

      - name: Set up uv
        uses: astral-sh/setup-uv@v7

      - name: Create virtual environment
        run: uv venv .venv -p 3.15

      - name: Install Python tools
        run: uv pip install maturin pytest

      - name: Run Rust tests
        run: cargo test -q

      - name: Build editable Python package
        run: uv run maturin develop

      - name: Run Python smoke tests
        run: uv run pytest -q tests/python
